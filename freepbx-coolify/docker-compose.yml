services:
  freepbx:
    image: tiredofit/freepbx:latest
    container_name: freepbx
    network_mode: host  # OBLIGATOIRE pour SIP/RTP
    volumes:
      - ./data:/data
      - ./logs:/var/log
      - ./certs:/certs
    environment:
      - TIMEZONE=Europe/Paris
      - ADMIN_USER=admin
      - ADMIN_PASS=ChangeMoi2026!
      - RTP_START=10000
      - RTP_FINISH=20000
      - HTTP_PORT=8089
      - HTTPS_PORT=8443
      - SIP_PORT=5060
      - IAX_PORT=4569
    restart: unless-stopped
