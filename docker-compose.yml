services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gld-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: godlovesdiversity
      POSTGRES_USER: gld
      POSTGRES_PASSWORD: gld
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gld -d godlovesdiversity"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gld-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: gld-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gldminio
      MINIO_ROOT_PASSWORD: gldminio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: gld-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 gldminio gldminio-secret &&
      mc mb -p local/godlovesdiversity || true &&
      mc anonymous set download local/godlovesdiversity || true &&
      echo '✅ MinIO bucket godlovesdiversity ready'
      "

  mailpit:
    image: axllent/mailpit:latest
    container_name: gld-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # WebUI

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gld-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"
    # ENTRYPOINT défini dans le Dockerfile (docker/web-entrypoint.sh)

volumes:
  pgdata:
  redisdata:
  miniodata:
